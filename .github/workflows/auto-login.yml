name: Auto-login for Lunes.Host

on:
  schedule:
    - cron: '0 0 * * *' # 每天00:00触发一次

jobs:
  auto-login:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Setup environment
        run: |
          # 安装相关工具或环境，如果需要的话
          echo "Setting up environment"

      - name: Execute login script
        run: |
          curl -X POST "https://login.lunes.host/api/login" -d "username=${{ secrets.LUNES_USERNAME }}" -d "password=${{ secrets.LUNES_PASSWORD }}"
        env:
          LUNES_USERNAME: ${{ secrets.LUNES_USERNAME }}
          LUNES_PASSWORD: ${{ secrets.LUNES_PASSWORD }}
